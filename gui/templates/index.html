<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCAD Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ──────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b12;--surface:#111119;--elevated:#1a1a28;--viewer:#080810;
  --text:#f1f5f9;--text2:#94a3b8;--muted:#475569;
  --accent:#6366f1;--accent2:#a855f7;
  --border:rgba(255,255,255,.06);--border-focus:rgba(99,102,241,.55);
  --success:#10b981;--error:#ef4444;
  --radius:12px;--radius-sm:8px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden}

/* ── Layout ────────────────────────────────────────────── */
.app{display:grid;grid-template-rows:52px 1fr;grid-template-columns:380px 1fr;height:100vh}
.header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);z-index:10}
.header h1{font-size:16px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.3px}
.header .badge{font-size:11px;font-weight:500;color:var(--text2);background:var(--elevated);
  padding:4px 10px;border-radius:20px;border:1px solid var(--border)}

/* ── Chat Panel ────────────────────────────────────────── */
.chat{display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}

/* Message bubbles */
.msg{max-width:92%;padding:12px 16px;border-radius:var(--radius);font-size:13.5px;line-height:1.6;
  animation:slideUp .3s cubic-bezier(.16,1,.3,1)}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border-bottom-right-radius:4px}
.msg.system{align-self:flex-start;background:var(--elevated);color:var(--text);
  border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.system strong{color:#c4b5fd}
.msg p{margin:0 0 6px}
.msg p:last-child{margin-bottom:0}

/* Typing indicator */
.typing{display:flex;gap:5px;padding:12px 16px;align-self:flex-start}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);
  animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{to{opacity:.3;transform:translateY(-4px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Input area */
.input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;
  background:var(--surface)}
.input-area input{flex:1;background:var(--elevated);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:13.5px;
  font-family:var(--font);outline:none;transition:border-color .2s}
.input-area input:focus{border-color:var(--border-focus)}
.input-area input::placeholder{color:var(--muted)}
.input-area button{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  border:none;border-radius:var(--radius-sm);padding:0 20px;font-size:13px;font-weight:600;
  font-family:var(--font);cursor:pointer;transition:opacity .2s,transform .1s;white-space:nowrap}
.input-area button:hover{opacity:.9}
.input-area button:active{transform:scale(.97)}
.input-area button:disabled{opacity:.45;cursor:not-allowed}

/* ── 3D Viewer Panel ───────────────────────────────────── */
.viewer{position:relative;background:var(--viewer);overflow:hidden}
#canvas-container{width:100%;height:100%}

/* Viewer overlay messages */
.viewer-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;
  flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:5;
  transition:opacity .4s}
.viewer-overlay.hidden{opacity:0}
.viewer-overlay .icon{font-size:48px;margin-bottom:16px;opacity:.4}
.viewer-overlay .label{font-size:14px;color:var(--text2);max-width:280px;text-align:center;line-height:1.6}

/* Loading spinner */
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Model info bar */
.model-info{position:absolute;bottom:0;left:0;right:0;padding:10px 20px;
  background:linear-gradient(transparent,rgba(0,0,0,.7));font-size:12px;color:var(--text2);
  display:flex;justify-content:space-between;z-index:4;pointer-events:none;
  opacity:0;transition:opacity .4s}
.model-info.visible{opacity:1}
</style>
</head>

<body>
<div class="app">
  <!-- Header -->
  <header class="header">
    <h1>◆ DeepCAD Studio</h1>
    <span class="badge" id="status-badge">Ready</span>
  </header>

  <!-- Chat -->
  <section class="chat">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Describe a design or type 'generate'..." autocomplete="off">
      <button id="send-btn">Send</button>
    </div>
  </section>

  <!-- 3D Viewer -->
  <section class="viewer">
    <div id="canvas-container"></div>
    <div class="viewer-overlay" id="empty-overlay">
      <div class="icon">◇</div>
      <div class="label">Describe a design in the chat panel or type <strong>generate</strong> to create a 3D CAD model.</div>
    </div>
    <div class="viewer-overlay hidden" id="loading-overlay">
      <div class="spinner"></div>
      <div class="label">Generating CAD model…</div>
    </div>
    <div class="model-info" id="model-info">
      <span id="info-left"></span>
      <span>Rotate · Zoom · Pan</span>
    </div>
  </section>
</div>

<!-- Three.js via importmap (ES modules) -->
<script type="importmap">
{
  "imports":{
    "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

/* ── DOM refs ─────────────────────────────────────────── */
const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');
const emptyOv     = document.getElementById('empty-overlay');
const loadingOv   = document.getElementById('loading-overlay');
const modelInfo   = document.getElementById('model-info');
const infoLeft    = document.getElementById('info-left');
const statusBadge = document.getElementById('status-badge');

/* ── Three.js scene ───────────────────────────────────── */
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setClearColor(0x080810);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.01, 100);
camera.position.set(2, 1.5, 2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

/* Lights */
scene.add(new THREE.AmbientLight(0x404060, 0.6));
const key = new THREE.DirectionalLight(0xffffff, 1.2);
key.position.set(4, 6, 4);
scene.add(key);
const fill = new THREE.DirectionalLight(0x8888ff, 0.35);
fill.position.set(-4, 2, -4);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 0.3);
rim.position.set(0, -3, -5);
scene.add(rim);

/* Grid */
const grid = new THREE.GridHelper(6, 24, 0x222244, 0x16162a);
grid.material.transparent = true;
grid.material.opacity = 0.45;
scene.add(grid);

/* Material for CAD models */
const cadMaterial = new THREE.MeshPhysicalMaterial({
  color: 0x9098b8,
  metalness: 0.35,
  roughness: 0.45,
  clearcoat: 0.25,
  clearcoatRoughness: 0.5,
  side: THREE.DoubleSide,
});

let currentMesh = null;

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

/* ── Load STL into viewer ─────────────────────────────── */
const stlLoader = new STLLoader();

function loadSTL(url){
  return new Promise((resolve, reject) => {
    stlLoader.load(url,
      geom => {
        if(currentMesh){ scene.remove(currentMesh); currentMesh.geometry.dispose(); }
        geom.computeVertexNormals();
        const mesh = new THREE.Mesh(geom, cadMaterial);

        /* Auto-center and scale */
        const box    = new THREE.Box3().setFromObject(mesh);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        mesh.position.sub(center);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale  = 1.8 / maxDim;
        mesh.scale.setScalar(scale);

        scene.add(mesh);
        currentMesh = mesh;

        /* Reposition camera */
        camera.position.set(2, 1.5, 2);
        controls.target.set(0, 0, 0);
        controls.update();

        resolve();
      },
      undefined,
      err => reject(err)
    );
  });
}

/* ── Chat helpers ─────────────────────────────────────── */
function addMessage(text, role){
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = formatMarkdown(text);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping(){
  const t = document.createElement('div');
  t.className = 'typing'; t.id = 'typing-indicator';
  t.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(t);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping(){
  const t = document.getElementById('typing-indicator');
  if(t) t.remove();
}

function formatMarkdown(text){
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

/* ── Welcome message ──────────────────────────────────── */
addMessage(
  "**Welcome to DeepCAD Studio** 👋\n\n" +
  "I can generate 3D CAD models from DeepCAD's learned design space.\n\n" +
  "• Type **generate** to create a new shape\n" +
  "• Type **show [ID]** to view a reconstructed model\n" +
  "• Or simply **describe a design** and I'll create one!\n\n" +
  "Type **help** for all commands.",
  'system'
);

/* ── Send logic ───────────────────────────────────────── */
async function send(){
  const msg = inputEl.value.trim();
  if(!msg) return;
  inputEl.value = '';
  addMessage(msg, 'user');

  sendBtn.disabled = true;
  inputEl.disabled = true;
  statusBadge.textContent = 'Processing…';
  showTyping();

  /* Show loading overlay on viewer */
  emptyOv.classList.add('hidden');
  loadingOv.classList.remove('hidden');
  modelInfo.classList.remove('visible');

  try{
    const res  = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: msg}),
    });
    const data = await res.json();
    hideTyping();

    addMessage(data.reply || 'No response.', 'system');

    if(data.model_url){
      statusBadge.textContent = 'Loading 3D…';
      await loadSTL(data.model_url);
      loadingOv.classList.add('hidden');
      modelInfo.classList.add('visible');
      infoLeft.textContent = data.model_url.split('/').pop().replace('.stl','');
      statusBadge.textContent = 'Model Loaded';
    } else {
      loadingOv.classList.add('hidden');
      if(!currentMesh) emptyOv.classList.remove('hidden');
      statusBadge.textContent = 'Ready';
    }
  } catch(err){
    hideTyping();
    loadingOv.classList.add('hidden');
    if(!currentMesh) emptyOv.classList.remove('hidden');
    addMessage('⚠️ **Connection error.** Make sure the server is running.', 'system');
    statusBadge.textContent = 'Error';
    console.error(err);
  }

  sendBtn.disabled = false;
  inputEl.disabled = false;
  inputEl.focus();
}

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', e => { if(e.key === 'Enter') send(); });
inputEl.focus();
</script>
</body>
</html>
